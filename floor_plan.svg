<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1400" viewBox="0 0 1000 1400">
  <defs>
    <style>
      .site { fill: #f8f6ef; stroke: #222; stroke-width: 4; }
      .room { fill: #fffdf7; stroke: #222; stroke-width: 3; }
      .living { fill: #f1f7ff; }
      .kitchen { fill: #fff1df; }
      .store { fill: #f0ece5; }
      .bath { fill: #e7f6f4; }
      .yard { fill: #eef7eb; }
      .wall { stroke: #222; stroke-width: 5; stroke-linecap: square; }
      .door { stroke: #fffdf7; stroke-width: 8; stroke-linecap: square; }
      .text { font-family: Arial, "Microsoft YaHei", sans-serif; fill: #1f1f1f; text-anchor: middle; }
      .label { font-size: 28px; font-weight: 700; }
      .sub { font-size: 18px; }
      .small { font-size: 16px; }
      .outside { fill: #555; font-size: 22px; font-weight: 700; }
      .dim { fill: #333; font-size: 18px; }
      .callout { fill: #fffdf7; stroke: #b45309; stroke-width: 2; }
      .callout-text { fill: #7c2d12; font-size: 15px; font-weight: 700; }
      .route { stroke: #b45309; stroke-width: 5; stroke-dasharray: 12 10; stroke-linecap: round; }
      .route-solid { stroke: #b45309; stroke-width: 4; stroke-linecap: round; }
      .road { fill: #dedede; }
      .path { fill: #e8edf5; }
      .neighbor { fill: #eee8df; }
    </style>
  </defs>

  <!-- Scale: 1m = 40px. Plot: 15m x 28m = 600px x 1120px -->
  <rect x="0" y="0" width="1000" height="1400" fill="#ffffff"/>

  <text x="500" y="48" class="text label">河北农村一层自建房户型示意图</text>
  <text x="500" y="78" class="text sub">宅基地：东西 15 米 × 南北 28 米；北侧邻居，东侧过道，南侧大路</text>

  <!-- Outside context -->
  <rect x="118" y="112" width="64" height="1120" class="neighbor"/>
  <text x="150" y="670" class="text outside" transform="rotate(-90 150 670)">西侧邻居</text>

  <rect x="790" y="46" width="80" height="1276" class="path"/>
  <text x="830" y="670" class="text outside" transform="rotate(90 830 670)">东侧过道</text>
  <line x1="830" y1="124" x2="830" y2="1238" class="route"/>
  <path d="M830 1254 L814 1226 L846 1226 Z" fill="#b45309"/>

  <rect x="190" y="46" width="600" height="50" class="neighbor"/>
  <text x="490" y="80" class="text outside">北侧邻居</text>
  <rect x="790" y="54" width="44" height="42" fill="#b45309" stroke="#222" stroke-width="2"/>
  <rect x="838" y="54" width="132" height="48" rx="4" class="callout"/>
  <text x="904" y="74" class="text callout-text">北侧邻居大门</text>
  <text x="904" y="94" class="text callout-text">开向东侧过道北端</text>

  <rect x="190" y="1232" width="680" height="90" class="road"/>
  <text x="530" y="1276" class="text outside">南侧大路</text>
  <text x="530" y="1306" class="text outside">东侧过道南端接入南侧大路</text>

  <!-- Site boundary -->
  <rect x="190" y="112" width="600" height="1120" class="site"/>
  <rect x="190" y="112" width="600" height="208" class="room yard"/>
  <text x="490" y="198" class="text label">北侧后院 / 采光缓冲</text>
  <text x="490" y="228" class="text sub">约 15m × 5.2m，减少北侧邻居干扰</text>

  <!-- Dimension notes -->
  <text x="490" y="106" class="text dim">15m</text>
  <text x="812" y="676" class="text dim" transform="rotate(90 812 676)">28m</text>
  <text x="720" y="145" class="text small">北</text>
  <text x="720" y="1210" class="text small">南</text>
  <rect x="875" y="1168" width="106" height="54" rx="4" class="callout"/>
  <text x="928" y="1191" class="text callout-text">过道南端</text>
  <text x="928" y="1211" class="text callout-text">接南侧大路</text>

  <!-- Front courtyard / entry buffer -->
  <rect x="190" y="1024" width="600" height="208" class="room yard"/>
  <text x="490" y="1115" class="text label">南院 / 入户缓冲</text>
  <text x="490" y="1145" class="text sub">15m × 5.2m，停车、晾晒、待客</text>

  <rect x="190" y="320" width="600" height="704" fill="none" stroke="#222" stroke-width="5"/>
  <text x="490" y="310" class="text small">主体房屋约 15m × 17.6m，北侧留后窗/检修缓冲</text>

  <rect x="190" y="320" width="180" height="176" class="room"/>
  <rect x="370" y="320" width="180" height="176" class="room"/>
  <rect x="550" y="320" width="120" height="176" class="room store"/>
  <rect x="670" y="320" width="120" height="176" class="room kitchen"/>
  <text x="280" y="390" class="text label">卧室3</text>
  <text x="280" y="418" class="text sub">4.5m × 5m</text>
  <text x="460" y="390" class="text label">卧室4</text>
  <text x="460" y="418" class="text sub">4.5m × 5m</text>
  <text x="610" y="388" class="text label">储物间</text>
  <text x="610" y="416" class="text sub">3m × 5m</text>
  <text x="730" y="388" class="text label">厨房</text>
  <text x="730" y="416" class="text sub">3m × 5m</text>
  <text x="730" y="442" class="text small">靠东过道排烟</text>

  <rect x="190" y="520" width="180" height="224" class="room"/>
  <rect x="370" y="520" width="200" height="224" class="room living"/>
  <rect x="570" y="520" width="100" height="112" class="room bath"/>
  <rect x="570" y="632" width="100" height="112" class="room store"/>
  <rect x="670" y="520" width="120" height="224" class="room living"/>
  <text x="280" y="614" class="text label">卧室5</text>
  <text x="280" y="642" class="text sub">4.5m × 5.6m</text>
  <text x="470" y="602" class="text label">餐厅 / 过厅</text>
  <text x="470" y="630" class="text sub">连接客厅、卧室、厨房</text>
  <text x="620" y="568" class="text sub">预留</text>
  <text x="620" y="594" class="text sub">卫生间</text>
  <text x="620" y="680" class="text sub">杂物</text>
  <text x="620" y="706" class="text sub">换季</text>
  <text x="730" y="612" class="text label">后勤门厅</text>
  <text x="730" y="640" class="text sub">通厨房和东过道</text>

  <rect x="190" y="744" width="180" height="280" class="room"/>
  <rect x="370" y="744" width="240" height="280" class="room living"/>
  <rect x="610" y="744" width="180" height="280" class="room"/>
  <text x="280" y="864" class="text label">卧室1</text>
  <text x="280" y="892" class="text sub">南向老人房</text>
  <text x="280" y="920" class="text sub">4.5m × 7m</text>
  <text x="490" y="848" class="text label">堂屋 / 大客厅</text>
  <text x="490" y="878" class="text sub">6m × 7m，南向入户</text>
  <text x="490" y="906" class="text small">会客、家庭活动、祭祀陈设</text>
  <text x="700" y="864" class="text label">卧室2</text>
  <text x="700" y="892" class="text sub">南向主卧</text>
  <text x="700" y="920" class="text sub">4.5m × 7m</text>

  <line x1="455" y1="1024" x2="525" y2="1024" class="door"/>
  <line x1="455" y1="744" x2="525" y2="744" class="door"/>
  <line x1="370" y1="600" x2="370" y2="660" class="door"/>
  <line x1="670" y1="580" x2="670" y2="640" class="door"/>
  <line x1="790" y1="580" x2="790" y2="640" class="door"/>

  <!-- Site access arrows -->
  <path d="M490 1260 L490 1230" stroke="#333" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M790 1120 L820 1120" stroke="#333" stroke-width="4"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#333"/>
    </marker>
  </defs>

  <!-- Notes -->
  <text x="450" y="1388" class="text small">说明：此图为功能布局草案，未包含结构柱网、承重墙、采光窗、卫生间、楼梯、宅基地红线审批等施工图内容。</text>
</svg>
