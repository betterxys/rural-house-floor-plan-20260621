<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1400" viewBox="0 0 900 1400">
  <defs>
    <style>
      .site { fill: #f8f6ef; stroke: #222; stroke-width: 4; }
      .room { fill: #fffdf7; stroke: #222; stroke-width: 3; }
      .living { fill: #f1f7ff; }
      .kitchen { fill: #fff1df; }
      .store { fill: #f0ece5; }
      .yard { fill: #eef7eb; }
      .wall { stroke: #222; stroke-width: 5; stroke-linecap: square; }
      .door { stroke: #fffdf7; stroke-width: 8; stroke-linecap: square; }
      .text { font-family: Arial, "Microsoft YaHei", sans-serif; fill: #1f1f1f; text-anchor: middle; }
      .label { font-size: 28px; font-weight: 700; }
      .sub { font-size: 18px; }
      .small { font-size: 16px; }
      .outside { fill: #555; font-size: 22px; font-weight: 700; }
      .dim { fill: #333; font-size: 18px; }
      .callout { fill: #fffdf7; stroke: #b45309; stroke-width: 2; }
      .callout-text { fill: #7c2d12; font-size: 15px; font-weight: 700; }
      .route { stroke: #b45309; stroke-width: 5; stroke-dasharray: 12 10; stroke-linecap: round; }
      .route-solid { stroke: #b45309; stroke-width: 4; stroke-linecap: round; }
      .road { fill: #dedede; }
      .path { fill: #e8edf5; }
      .neighbor { fill: #eee8df; }
    </style>
  </defs>

  <!-- Scale: 1m = 40px. Plot: 15m x 28m = 600px x 1120px -->
  <rect x="0" y="0" width="900" height="1400" fill="#ffffff"/>

  <text x="450" y="48" class="text label">河北农村一层自建房户型示意图</text>
  <text x="450" y="78" class="text sub">宅基地：东西 15 米 × 南北 28 米；北侧邻居，东侧过道，南侧大路</text>

  <!-- Outside context -->
  <rect x="118" y="112" width="64" height="1120" class="neighbor"/>
  <text x="150" y="670" class="text outside" transform="rotate(-90 150 670)">西侧邻居</text>

  <rect x="718" y="112" width="64" height="1120" class="path"/>
  <text x="750" y="670" class="text outside" transform="rotate(90 750 670)">东侧过道：北端为北侧邻居大门，南端接南侧大路</text>
  <line x1="750" y1="140" x2="750" y2="1218" class="route"/>
  <path d="M750 1236 L734 1208 L766 1208 Z" fill="#b45309"/>

  <rect x="190" y="46" width="600" height="50" class="neighbor"/>
  <text x="490" y="80" class="text outside">北侧邻居</text>

  <rect x="190" y="1260" width="600" height="74" class="road"/>
  <text x="490" y="1304" class="text outside">南侧大路</text>
  <text x="490" y="1360" class="text outside">东侧过道南端接入南侧大路</text>

  <!-- Site boundary -->
  <rect x="190" y="112" width="600" height="1120" class="site"/>

  <!-- Dimension notes -->
  <text x="490" y="106" class="text dim">15m</text>
  <text x="812" y="676" class="text dim" transform="rotate(90 812 676)">28m</text>
  <text x="720" y="145" class="text small">北</text>
  <text x="720" y="1210" class="text small">南</text>
  <rect x="716" y="92" width="68" height="28" fill="#b45309" stroke="#222" stroke-width="2"/>
  <text x="750" y="88" class="text small">北侧邻居大门</text>
  <line x1="784" y1="106" x2="804" y2="134" class="route-solid"/>
  <rect x="794" y="126" width="96" height="58" rx="4" class="callout"/>
  <text x="842" y="150" class="text callout-text">过道北端</text>
  <text x="842" y="170" class="text callout-text">就是邻居大门</text>
  <line x1="782" y1="1222" x2="804" y2="1204" class="route-solid"/>
  <rect x="794" y="1160" width="96" height="62" rx="4" class="callout"/>
  <text x="842" y="1185" class="text callout-text">过道南端</text>
  <text x="842" y="1205" class="text callout-text">接南侧大路</text>

  <!-- Front courtyard / entry buffer -->
  <rect x="190" y="1032" width="600" height="200" class="room yard"/>
  <text x="490" y="1125" class="text label">南院 / 入户缓冲</text>
  <text x="490" y="1155" class="text sub">15m × 5m，可停车、晾晒、入户</text>

  <!-- Main building 15m x 23m -->
  <rect x="190" y="112" width="600" height="920" fill="none" stroke="#222" stroke-width="5"/>

  <!-- North bedroom row: depth 5m -->
  <rect x="190" y="112" width="200" height="200" class="room"/>
  <rect x="390" y="112" width="200" height="200" class="room"/>
  <rect x="590" y="112" width="200" height="200" class="room"/>
  <text x="290" y="198" class="text label">卧室1</text>
  <text x="290" y="226" class="text sub">5m × 5m</text>
  <text x="490" y="198" class="text label">卧室2</text>
  <text x="490" y="226" class="text sub">5m × 5m</text>
  <text x="690" y="198" class="text label">卧室3</text>
  <text x="690" y="226" class="text sub">5m × 5m</text>

  <!-- Middle row: west bedroom, central living, east bedroom -->
  <rect x="190" y="312" width="200" height="280" class="room"/>
  <rect x="390" y="312" width="200" height="280" class="room living"/>
  <rect x="590" y="312" width="200" height="280" class="room"/>
  <text x="290" y="438" class="text label">卧室4</text>
  <text x="290" y="466" class="text sub">5m × 7m</text>
  <text x="490" y="424" class="text label">大客厅</text>
  <text x="490" y="452" class="text sub">5m × 7m</text>
  <text x="490" y="480" class="text small">可做堂屋/会客/餐区</text>
  <text x="690" y="438" class="text label">卧室5</text>
  <text x="690" y="466" class="text sub">5m × 7m</text>

  <!-- South service row within building: storage, extended living, kitchen -->
  <rect x="190" y="592" width="200" height="200" class="room store"/>
  <rect x="390" y="592" width="200" height="200" class="room living"/>
  <rect x="590" y="592" width="200" height="200" class="room kitchen"/>
  <text x="290" y="680" class="text label">储物间</text>
  <text x="290" y="708" class="text sub">5m × 5m</text>
  <text x="490" y="670" class="text label">客厅延伸</text>
  <text x="490" y="698" class="text sub">门厅 / 餐区</text>
  <text x="490" y="726" class="text small">与客厅连通</text>
  <text x="690" y="680" class="text label">厨房</text>
  <text x="690" y="708" class="text sub">5m × 5m</text>

  <!-- Covered porch -->
  <rect x="190" y="792" width="600" height="240" class="room yard"/>
  <text x="490" y="895" class="text label">前廊 / 半室外活动区</text>
  <text x="490" y="925" class="text sub">15m × 6m，连接南院和室内</text>

  <!-- Openings / simplified doors -->
  <line x1="455" y1="792" x2="525" y2="792" class="door"/>
  <line x1="455" y1="592" x2="525" y2="592" class="door"/>
  <line x1="455" y1="312" x2="525" y2="312" class="door"/>
  <line x1="265" y1="312" x2="315" y2="312" class="door"/>
  <line x1="465" y1="312" x2="515" y2="312" class="door"/>
  <line x1="665" y1="312" x2="715" y2="312" class="door"/>
  <line x1="390" y1="430" x2="390" y2="490" class="door"/>
  <line x1="590" y1="430" x2="590" y2="490" class="door"/>
  <line x1="390" y1="665" x2="390" y2="720" class="door"/>
  <line x1="590" y1="665" x2="590" y2="720" class="door"/>

  <!-- Site access arrows -->
  <path d="M490 1260 L490 1230" stroke="#333" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M790 1120 L820 1120" stroke="#333" stroke-width="4"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#333"/>
    </marker>
  </defs>

  <!-- Notes -->
  <text x="450" y="1388" class="text small">说明：此图为功能布局草案，未包含结构柱网、承重墙、采光窗、卫生间、楼梯、宅基地红线审批等施工图内容。</text>
</svg>
